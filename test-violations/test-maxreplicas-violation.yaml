# Test: Deployment replicas=6 -> phải bị REJECT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-too-many-replicas
  namespace: demo
spec:
  replicas: 6
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.0
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          runAsUser: 1000
