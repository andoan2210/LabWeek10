# Test: Deployment replicas=3 -> phải PASS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-valid-replicas
  namespace: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-valid
  template:
    metadata:
      labels:
        app: test-valid
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.0
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          runAsUser: 1000
