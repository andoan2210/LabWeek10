# Lab 2.1 - ESO ExternalSecret
# Map key "db_password" từ AWS Secrets Manager secret "demo/db-password"
# vào K8s Secret "api-secret" trong namespace demo
# refreshInterval: 30s → đảm bảo sync < 60s khi rotate trên AWS
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-secret
  namespace: demo
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: api-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: db_password
    remoteRef:
      key: demo/db-password
      property: db_password
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
